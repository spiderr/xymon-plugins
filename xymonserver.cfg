# xymonserver.cfg — Xymon server config additions for xymon-plugins
#
# These values must be added to /etc/xymon/xymonserver.cfg on the Xymon server.
# They are separate from the default xymonserver.cfg entries — append or merge them.
#
# Plugins that require each entry:
#   net   arista/arista_monitor.py, ciscoasa/asa_monitor.py
#         Maps the "net" service column to net.rrd so historylog and svcstatus
#         display the bandwidth trend graph. Without this, net.rrd is written but
#         never shown — graphs.cfg [net] and GRAPHS=net are both necessary but not
#         sufficient; TEST2RRD is the missing piece.

# Append ",net" to the existing TEST2RRD line:
#   TEST2RRD="...,net"
#
# The GRAPHS line already includes "net" in the default Xymon 4.3.30 config.
# If your GRAPHS line does not include it, add ",net" there as well.
